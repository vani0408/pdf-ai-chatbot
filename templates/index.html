<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>PDF AI Chatbot</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="container container-box">

    <h1 class="text-center mb-4">
        PDF AI Chatbot
    </h1>

    <!-- Upload -->

    <div class="card p-4 mb-4">

        <h4>Upload PDF(s)</h4>

        <input
            type="file"
            id="pdf"
            class="form-control mb-3"
            accept=".pdf"
            multiple>

        <button
            class="btn btn-primary"
            onclick="uploadPDF()">

            Upload
        </button>

        <div
            id="uploadStatus"
            class="mt-3">
        </div>

    </div>

    <!-- Uploaded Docs -->

    <div class="card p-4 mb-4">

        <h4>Uploaded Documents</h4>

        <div id="documentList">

            <p class="text-muted">
                No documents uploaded yet
            </p>

        </div>

    </div>

    <!-- PDF Preview -->

    <div class="card p-4 mb-4">

        <h4>Selected Document Preview</h4>

        <iframe
            id="pdfViewer"
            width="100%"
            height="600">
        </iframe>

    </div>

    <!-- Chat Layout -->

    <div class="row">

        <div class="col-md-3">

            <div class="card p-3">

                <h5>Chat History</h5>

                <div id="historySidebar">

                    <p class="text-muted">
                        No chats yet
                    </p>

                </div>

            </div>

        </div>

        <div class="col-md-9">

            <div class="card p-4">

                <h4>Ask Questions</h4>

                <div class="mb-3">

                    <button
                        class="btn btn-danger"
                        onclick="clearChat()">

                        Clear Chat
                    </button>

                    <button
                        class="btn btn-secondary ms-2"
                        onclick="downloadChat()">

                        Download Chat
                    </button>

                </div>

                <div
                    id="chatbox"
                    class="mb-3">
                </div>

                <div class="input-group">

                    <input
                        type="text"
                        id="question"
                        class="form-control"
                        placeholder="Ask a question about uploaded PDFs...">

                    <button
                        class="btn btn-success"
                        onclick="askQuestion()">

                        Ask

                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
